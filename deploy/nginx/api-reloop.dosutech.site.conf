# RELOOP API — api-reloop.dosutech.site
# Backend chạy PM2 port 3002 (không dùng 3000/3001 mặc định)
#
# Cài đặt:
#   sudo cp deploy/nginx/api-reloop.dosutech.site.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/api-reloop.dosutech.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (sau khi HTTP chạy ổn, DNS trỏ đúng):
#   sudo certbot --nginx -d api-reloop.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name api-reloop.dosutech.site;

    # Certbot ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Upload ảnh tin đăng / CCCD (multer max 5MB/file)
        client_max_body_size 10M;
    }
}
