# RELOOP Frontend — reloop.dosutech.site
# Serve static build (dist/) + proxy /api và /uploads → backend :3002
#
# Cài đặt:
#   cd /home/reloop && npm run build
#   sudo cp deploy/nginx/reloop.dosutech.site.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/reloop.dosutech.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d reloop.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name reloop.dosutech.site;

    root /home/reloop/dist;
    index index.html;

    # API — cùng origin, frontend gọi /api/...
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # Ảnh upload
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
